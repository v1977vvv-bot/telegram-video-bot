name: Build RunPod ComfyUI RTX PRO cu130 image

on:
  workflow_dispatch:
  push:
    paths:
      - "docker/runpod-comfyui/**"
      - ".github/workflows/build-runpod-comfyui-rtxpro-cu130.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push RTX PRO cu130 image
        uses: docker/build-push-action@v6
        with:
          context: docker/runpod-comfyui
          file: docker/runpod-comfyui/Dockerfile.rtxpro-cu130
          push: true
          tags: ghcr.io/v1977vvv-bot/synzai-comfyui:rtx-pro-cu130
          platforms: linux/amd64
