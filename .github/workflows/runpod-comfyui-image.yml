name: Build RunPod ComfyUI image

on:
  workflow_dispatch:
  push:
    paths:
      # Keep production latest protected from experimental script/profile changes.
      # Use workflow_dispatch for intentional latest rebuilds after script changes.
      - "docker/runpod-comfyui/Dockerfile"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER}/synzai-comfyui" >> "$GITHUB_ENV"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/runpod-comfyui
          file: docker/runpod-comfyui/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
